<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cadastro - Consumo Consciente</title>

    <link rel="stylesheet"
          href="css/bootstrap.min.css">

    <link rel="stylesheet"
          href="css/cadastro.css">

</head>

<body>

<div class="register-card">

    <img
        src="img/logo.png"
        alt="Logo"
        class="logo">

    <h4>Cadastro</h4>

    <div id="mensagem"></div>

    <form id="cadastroForm">

        <input
            type="text"
            id="nome"
            class="form-control"
            placeholder="Nome completo"
            required>

        <input
            type="email"
            id="email"
            class="form-control"
            placeholder="Email"
            required>

        <input
            type="password"
            id="senha"
            class="form-control"
            placeholder="Senha"
            required>

        <input
            type="password"
            id="confirmarSenha"
            class="form-control"
            placeholder="Confirmar senha"
            required>

        <button
            type="submit"
            class="btn btn-primary">

            Cadastrar

        </button>

    </form>

    <p class="text-center mt-3">

        Já tem conta?

        <a href="login.html">

            Entrar

        </a>

    </p>

</div>

<script src="js/cadastro.js"></script>

</body>

</html>
