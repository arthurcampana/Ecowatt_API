<main class="container content-wrap">



    <!-- CABEÇALHO -->

    <div class="page-header">


        <div>


            <h3>
                Registrar Consumo
            </h3>


            <p>
                Gerencie e acompanhe os registros de consumo energético.
            </p>


        </div>



        <button 
            class="btn-add"
            id="btnAbrirFormulario">


            Adicionar Consumo


        </button>


    </div>






    <!-- FILTRO -->

    <div class="card p-3 mb-4">


        <h5>
            Filtrar Consumos
        </h5>



        <div class="row g-3">



            <div class="col-md-4">


                <label class="form-label">

                    Mês

                </label>


                <select 
                    id="filtroMes"
                    class="form-select">


                    <option value="">
                        Todos
                    </option>


                    <option value="0">
                        Janeiro
                    </option>


                    <option value="1">
                        Fevereiro
                    </option>


                    <option value="2">
                        Março
                    </option>


                    <option value="3">
                        Abril
                    </option>


                    <option value="4">
                        Maio
                    </option>


                    <option value="5">
                        Junho
                    </option>


                    <option value="6">
                        Julho
                    </option>


                    <option value="7">
                        Agosto
                    </option>


                    <option value="8">
                        Setembro
                    </option>


                    <option value="9">
                        Outubro
                    </option>


                    <option value="10">
                        Novembro
                    </option>


                    <option value="11">
                        Dezembro
                    </option>


                </select>


            </div>





            <div class="col-md-4">


                <label class="form-label">

                    Ano

                </label>



                <input 
                    type="number"
                    id="filtroAno"
                    class="form-control"
                    placeholder="Ex: 2026">


            </div>





            <div class="col-md-4 d-flex align-items-end">


                <button
                    class="btn btn-success w-100"
                    id="btnFiltrar">


                    Filtrar


                </button>


            </div>



        </div>



    </div>







    <!-- FORM -->

    <div 
        class="form-card"
        id="cardFormulario">



        <div class="form-card-header">



            <div class="d-flex justify-content-between align-items-center">


                <h5 id="tituloFormulario">

                    Novo Consumo

                </h5>



                <button 
                    type="button"
                    class="btn-close-custom"
                    id="btnFecharFormulario">


                    ×


                </button>



            </div>


        </div>







        <div class="form-card-body">


            <form id="formConsumo">



                <input 
                    type="hidden"
                    id="consumoId">





                <div class="mb-4">


                    <label 
                        for="consumoKwh"
                        class="form-label">


                        Consumo (kWh)


                    </label>




                    <input 
                        type="number"
                        step="0.01"
                        id="consumoKwh"
                        class="form-control"
                        placeholder="Ex.: 42.50"
                        required>



                    <div class="helper-text">

                        Informe o valor consumido.

                    </div>



                </div>






                <div class="mb-4">


                    <label 
                        for="dataRegistro"
                        class="form-label">


                        Data


                    </label>



                    <input 
                        type="datetime-local"
                        id="dataRegistro"
                        class="form-control">



                </div>





                <button 
                    type="submit"
                    class="btn-save">


                    Salvar Consumo


                </button>




            </form>



        </div>



    </div>







    <!-- LISTAGEM -->

    <div class="historico-title">


        <h4>

            Histórico de Consumos

        </h4>


    </div>





    <div 
        class="lista-consumos"
        id="listaConsumos">



    </div>
