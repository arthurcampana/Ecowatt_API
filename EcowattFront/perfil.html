<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/perfil.css">

</head>

<body>

<nav class="navbar navbar-expand-lg bg-header">

    <div class="container">

        <a class="navbar-brand" href="index.html">
            <img src="img/logo.png" class="logo">
        </a>

        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menuNavbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div
                class="collapse navbar-collapse"
                id="menuNavbar">

            <ul class="navbar-nav ms-auto align-items-lg-center">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Início</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="consumo.html">Registrar Consumo</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="equipamento-usuario.html">Equipamentos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="relatorios.html">Relatórios</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="configuracoes.html">Configurações</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="perfil.html">Perfil</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<main class="container mt-5">

    <div class="perfil-card">

        <div class="text-center mb-4">

            <div class="avatar">

                <span id="avatarInicial">A</span>

            </div>

            <h3 class="mt-3">Meu Perfil</h3>

            <p class="text-muted">
                Atualize suas informações pessoais.
            </p>

        </div>

        <form id="formPerfil">

            <div class="mb-3">

                <label class="form-label">
                    Nome
                </label>

                <input
                        id="nome"
                        class="form-control"
                        type="text">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                        id="email"
                        class="form-control"
                        type="email"
                        disabled>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Nova senha
                </label>

                <input
                        id="senha"
                        class="form-control"
                        type="password">

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Confirmar senha
                </label>

                <input
                        id="confirmarSenha"
                        class="form-control"
                        type="password">

            </div>

            <div class="info-box mb-4">

                <strong>Conta criada em</strong>

                <p id="dataRegistro">
                    --
                </p>

            </div>

            <button
                    id="btnSalvar"
                    class="btn btn-success w-100">

                Salvar Alterações

            </button>
            <button
    type="button"
    id="btnLogout"
    class="btn btn-danger w-100 mt-3">

    Sair da conta

</button>

        </form>

    </div>

</main>

<div id="toastSucesso" class="toast-custom">

    Perfil atualizado com sucesso.

</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/perfil.js"></script>

</body>

</html>
