<main class="container">

    <div class="page-header">

        <h2>Configurações</h2>

        <p>
            Gerencie os parâmetros de consumo utilizados pelo sistema.
        </p>

    </div>

    <div class="row">

        <div class="col-lg-8">

            <div class="config-card">

                <h5>
                    Configuração de Consumo
                </h5>

                <form id="formConfiguracao">

                    <input
                        type="hidden"
                        id="configId">

                    <div class="mb-3">

                        <label class="form-label">

                            Meta de Consumo

                        </label>

                        <input
                            type="number"
                            step="0.01"
                            id="meta"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Valor da Tarifa

                        </label>

                        <input
                            type="number"
                            step="0.01"
                            id="valorTarifa"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Unidade de Medida

                        </label>

                        <select
                            id="unidadeMedida"
                            class="form-select">

                            <option value="kWh">
                                kWh
                            </option>

                            <option value="MWh">
                                MWh
                            </option>

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Salvar Configuração

                    </button>

                </form>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="config-card">

                <h6>Meta Atual</h6>

                <h2 id="metaAtual">
                    --
                </h2>

            </div>

            <div
                class="config-card mt-3">

                <h6>Tarifa Atual</h6>

                <h2 id="tarifaAtual">
                    --
                </h2>

            </div>

            <div
                class="config-card mt-3">

                <h6>Unidade</h6>

                <h2 id="unidadeAtual">
                    --
                </h2>

            </div>

        </div>

    </div>

</main>
